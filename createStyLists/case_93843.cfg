# =============================================================================
# SOT (SOURCE-OF-TRUTH) DATA EXPORT CONFIGURATION
# =============================================================================
# This configuration file defines how to extract study demographics and
# filesystem locations from the eRAD PACS database.
#
# RETAINED FILES (ACROSS MULTIPLE RUNS):
#   - sot_dstudy_fn:   Raw Dcstudy table export (for auditing)
#   - sot_extract_fn:  Merged SOT with adjusted object counts
#   - suid_styloc_fn:  Study UIDs mapped to filesystem locations
#
# TEMPORARY FILES CREATED AND DELETED WITHIN A SINGLE RUN:
#   - sot_pbrcounts file (merged into sot_extract, then deleted)
#   - suid list file (used as input for styloc generation, then deleted)
# =============================================================================

cur_datetime="$(date '+%Y%m%d-%H%M%S')"
work_dir="/home/medsrv/work/case_93843"
stop_date="20260201" # THEDATE field
case_number="93843"
erad_db="imagemedical"
mysql_bin="/home/medsrv/component/mysql/bin/mysql"

dateColumn="THEDATE"
# dateColumnFormat="DATE_FORMAT(IF(${dateColumn} = '' OR ${dateColumn} IS NULL, STR_TO_DATE('20000101', '%Y%m%d'), STR_TO_DATE(${dateColumn}, '%Y%m%d')), '%Y-%m-%d 00:00:00')"

# USED BY DCSTUDY-ONLY QUERIES
where_clause="WHERE mainst>='0' AND Dcstudy_d!='yes' AND derived NOT IN ('copy','shortcut')"

# KEY-ORDERING FOR MERGE/JOIN (MUST BE SORTED BY STYIUID FOR JOIN)
order_by_suid="ORDER BY STYIUID"

# --------------------------
# SOURCE-OF-TRUTH (SOT) - TWO PASS
#   PASS 1: EXPORT DCSTUDY ROWS (INCLUDES RAW NUMOFOBJ)
#   PASS 2: EXPORT PBR COUNTS (DCOBJECT ROWS WHERE FNAME LIKE 'Pb%') GROUPED BY STYIUID
#   MERGE: JOIN ON STYIUID LOCALLY AND SUBTRACT NUMOFPBR FROM NUMOFOBJ
# --------------------------
sot_extract_fn="Akumin-Hub1_SOT_StudyDemographics_${cur_datetime}.txt"

# PASS 1: DCSTUDY EXPORT (PIPE-DELIMITED)
sot_dstudy_fn="sot_dcstudy_${cur_datetime}.txt"
sot_header="STYIUID|NUMOFOBJ|SUMSIZE|PID|PNAME|PBDATE|ACCNO|MODALITY|BODYPART|THEDATE|THETIME|STYDESCR|RQPROCID|REFPHNAME|MAINST"
# sot_dstudy_columns="styiuid, numofobj, sumsize, pid, pbdate, accno, modality, ${dateColumnFormat} AS formatted_datetime, stydescr, Dcstudy_D, mainst"
# sot_dstudy_sql="SELECT styiuid,numofobj,sumsize,REPLACE(REPLACE(REPLACE(REPLACE(pid,'\r',''),'\n',''),'\t',''),'\"','') AS pid,pbdate,REPLACE(REPLACE(REPLACE(REPLACE(accno,'\r',''),'\n',''),'\t',''),'\"','') AS accno,REPLACE(REPLACE(REPLACE(REPLACE(modality,'\r',''),'\n',''),'\t',''),'\"','') AS modality,${dateColumnFormat} AS formatted_datetime,REPLACE(REPLACE(REPLACE(REPLACE(stydescr,'\r',''),'\n',''),'\t',''),'\"','') AS stydescr,Dcstudy_D,mainst FROM Dcstudy ${where_clause} ${order_by_suid}"
sot_dstudy_sql="SELECT styiuid,numofobj,sumsize,REPLACE(REPLACE(REPLACE(REPLACE(pid,'\r',''),'\n',''),'\t',''),'\"','') AS pid,REPLACE(REPLACE(REPLACE(REPLACE(pname,'\r',''),'\n',''),'\t',''),'\"','') AS pname,pbdate,REPLACE(REPLACE(REPLACE(REPLACE(accno,'\r',''),'\n',''),'\t',''),'\"','') AS accno,REPLACE(REPLACE(REPLACE(REPLACE(modality,'\r',''),'\n',''),'\t',''),'\"','') AS modality,REPLACE(REPLACE(REPLACE(REPLACE(BODYPART,'\r',''),'\n',''),'\t',''),'\"','') AS BODYPART,THEDATE,SUBSTRING_INDEX(THETIME,'.',1) AS THETIME,REPLACE(REPLACE(REPLACE(REPLACE(stydescr,'\r',''),'\n',''),'\t',''),'\"','') AS stydescr,REPLACE(REPLACE(REPLACE(REPLACE(RQPROCID,'\r',''),'\n',''),'\t',''),'\"','') AS RQPROCID,REPLACE(REPLACE(REPLACE(REPLACE(REFPHNAME,'\r',''),'\n',''),'\t',''),'\"','') AS REFPHNAME,mainst FROM Dcstudy ${where_clause} ${order_by_suid}"

# PASS 2: PBR COUNTS PER STUDY (PIPE-DELIMITED: STYIUID | NUMOFPBR)
sot_pbr_sql="SELECT styiuid, COUNT(*) AS numofpbr FROM Dcobject WHERE FNAME LIKE 'Pb%' GROUP BY styiuid ${order_by_suid}"

# SUID-STYLOC FILE (RETAINED)
suid_styloc_fn="suid-styloc_${cur_datetime}.txt"

# NUMBER OF PARALLEL JOBS FOR STYLOC GENERATION (1 = SEQUENTIAL)
styloc_parallelism=4

# -----------------------------------------------------------------------------
# SOT PIPELINE PATHS (USED BY COMPONENT2/3/4 SCRIPTS)
# -----------------------------------------------------------------------------
locate_study_bin="/home/medsrv/component/repositoryhandler/scripts/locateStudy.sh"
suid_fspath_cache_fn="suid_fspath_cache.txt"
suid_fspath_fn="suid_fspath.txt"
current_sot_link="current_sot.txt"
current_suid_fspath_link="current_suid_fspath.txt"
fspath_strip_prefix="/home/medsrv/data/dicom.repository"
